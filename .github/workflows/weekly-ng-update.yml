name: Weekly Angular Update

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: weekly-ng-update
  cancel-in-progress: false

jobs:
  ng-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prüfe vorhandenen Branch und PR
        id: precheck
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = 'chore/weekly-ng-update';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const branchExists = await github.rest.repos.getBranch({
              owner,
              repo,
              branch: branchName,
            }).then(() => true).catch(() => false);

            const openPrs = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${branchName}`,
            });

            const prExists = openPrs.data.length > 0;
            const defaultBranch = context.payload.repository?.default_branch || 'main';
            const shouldRun = !branchExists && !prExists;

            core.info(`branchExists=${branchExists}, prExists=${prExists}, shouldRun=${shouldRun}, defaultBranch=${defaultBranch}`);
            core.setOutput('branch_name', branchName);
            core.setOutput('branch_exists', String(branchExists));
            core.setOutput('pr_exists', String(prExists));
            core.setOutput('should_run', String(shouldRun));
            core.setOutput('default_branch', defaultBranch);

      - name: Überspringen, wenn Branch oder PR bereits existiert
        if: steps.precheck.outputs.should_run != 'true'
        run: |
          echo "Branch existiert: ${{ steps.precheck.outputs.branch_exists }}"
          echo "PR existiert: ${{ steps.precheck.outputs.pr_exists }}"
          echo "Nichts zu tun."

      - name: Create update branch
        if: steps.precheck.outputs.should_run == 'true'
        run: git checkout -b "${{ steps.precheck.outputs.branch_name }}"

      - name: Verify ng command
        if: steps.precheck.outputs.should_run == 'true'
        run: npx ng version

      - name: Run ng update
        if: steps.precheck.outputs.should_run == 'true'
        run: npx ng update

      - name: Check for changes
        if: steps.precheck.outputs.should_run == 'true'
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push changes
        if: steps.precheck.outputs.should_run == 'true' && steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: run weekly ng update"
          git push --set-upstream origin "${{ steps.precheck.outputs.branch_name }}"

      - name: Create pull request
        if: steps.precheck.outputs.should_run == 'true' && steps.changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = '${{ steps.precheck.outputs.branch_name }}';
            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'chore: weekly ng update',
              head: branchName,
              base: '${{ steps.precheck.outputs.default_branch }}',
              body: [
                'Automatisch erstellter PR durch den Weekly Angular Update Workflow.',
                '',
                '- Führt `ng update` aus',
                '- Enthält nur Änderungen, die dabei entstanden sind',
              ].join('\n'),
            });

      - name: No changes after ng update
        if: steps.precheck.outputs.should_run == 'true' && steps.changes.outputs.has_changes != 'true'
        run: echo "`ng update` hat keine Änderungen erzeugt."
