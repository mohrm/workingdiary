name: Angular CI

permissions:
  contents: read
  packages: read
  pull-requests: write

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    container:
      image: ghcr.io/${{ github.repository_owner }}/workingdiary-playwright-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6
      
      - name: npm install and npm run CI commands
        run: ./scripts/ci-install-and-build.sh
      - name: run unit test coverage
        run: |
          npm run test:coverage -- --ci --coverageReporters=lcov --coverageReporters=html --coverageReporters=text-summary --coverageReporters=json-summary
      - name: ensure Playwright browser is available
        run: |
          if ! node -e "const fs=require('fs'); const { chromium } = require('playwright'); const p=chromium.executablePath(); console.log('Chromium executable:', p); if(!fs.existsSync(p)) process.exit(1);"; then
            echo "Prebuilt Chromium binary missing for current Playwright version. Installing fallback browser..."
            npx playwright install chromium
          fi
      - name: prepare e2e tests
        run: |
          npx bddgen -c e2e/playwright.config.js
      - name: execute e2e tests with coverage
        run: |
          E2E_COVERAGE=true npm run e2e:ci
      - name: generate e2e coverage report
        run: |
          node scripts/generate-e2e-coverage.mjs
      - name: append coverage summary to GitHub Step Summary
        run: |
          {
            echo "## Unit Test Coverage"
            cat coverage/coverage-summary.json | node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync(0, 'utf8')); const t = data.total; console.log(`- Statements: ${t.statements.pct}% (${t.statements.covered}/${t.statements.total})`); console.log(`- Branches: ${t.branches.pct}% (${t.branches.covered}/${t.branches.total})`); console.log(`- Functions: ${t.functions.pct}% (${t.functions.covered}/${t.functions.total})`); console.log(`- Lines: ${t.lines.pct}% (${t.lines.covered}/${t.lines.total})`);"
            echo
            echo "## E2E Coverage"
            cat build/e2e-coverage/report/summary.md
          } >> "$GITHUB_STEP_SUMMARY"
      - name: upload e2e test report
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-report
          path: build/e2e
      - name: upload unit coverage report
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-coverage
          path: coverage
      - name: upload e2e coverage report
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-coverage
          path: build/e2e-coverage/report
      - name: store build artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-artifact
          path: |
            dist
            ./Dockerfile
            ./package.json
            ./nginx.default.conf.template
  create-image:
    if: github.event_name == 'push'
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    runs-on: ubuntu-latest
    needs: [build]

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write


    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: build-artifact
      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
      IMAGE_TAG: main
    needs: [create-image]
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/martoserver.key
          chmod 600 ~/.ssh/martoserver.key
          cat >>~/.ssh/config <<END
          Host ${{ secrets.SSH_HOST }}
            HostName ${{ secrets.SSH_HOST }}
            User ${{ secrets.SSH_USER }}
            IdentityFile ~/.ssh/martoserver.key
          END
      - name: Add Martoserver to Known Hosts
        run: ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
      - name: deploy docker image on server via SSH
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} -p ${{ secrets.SSH_PORT }} <<EOF
          cd docker
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main && \
          docker-compose up -d workingdiary && \
          docker image prune -a -f
          EOF
    
          
          
      
